name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          echo "VERSION_CODE=${MAJOR}" >> $GITHUB_ENV
          echo "VERSION_NAME=${TAG}" >> $GITHUB_ENV

      - name: Inject versionCode and versionName
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ env.VERSION_CODE }}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ env.VERSION_NAME }}\"/" app/build.gradle

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/keystore.jks
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION_NAME }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## v${{ env.VERSION_NAME }}

            Descarga el APK e instálalo en tu dispositivo.
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
